[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/judge"
  to = "/.netlify/functions/judge"
  status = 200

[[redirects]]
  from = "/api/unlock"
  to = "/.netlify/functions/unlock"
  status = 200
